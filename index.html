<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode Solutions</title>
 <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    header {
      background-color: #000000;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 3px solid #ffffff;
    }

    header h1 {
      font-size: 28px;
      color: #ffffff;
      font-weight: 700;
    }

    header h1 span {
      color: #ffffff;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .subtitle {
      color: #999999;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .solution-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .solution-item {
      background-color: #111111;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #333333;
      transition: border-color 0.2s;
    }

    .solution-item:hover {
      border-color: #ffffff;
    }

    .solution-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      color: #ffffff;
      text-decoration: none;
      cursor: pointer;
      user-select: none;
    }

    .solution-link:hover {
      color: #cccccc;
    }

    .solution-number {
      color: #ffffff;
      font-weight: 700;
      margin-right: 12px;
      min-width: 40px;
    }

    .solution-title {
      flex: 1;
      font-size: 16px;
    }

    .solution-lang {
      background-color: #ffffff20;
      color: #ffffff;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 12px;
    }

    .arrow {
      margin-left: 16px;
      transition: transform 0.3s;
      color: #ffffff;
      font-size: 12px;
    }

    .arrow.open {
      transform: rotate(90deg);
    }

    .code-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      background-color: #0a0a0a;
    }

    .code-panel.open {
      max-height: 2000px;
    }

    .code-panel pre {
      padding: 20px;
      margin: 0;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.6;
      color: #d4d4d4;
      font-family: 'Fira Code', 'Consolas', 'Courier New', monospace;
    }

    .error {
      color: #ffffff;
    }

    .badge-count {
      background-color: #ffffff;
      color: #000000;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 16px;
      margin-left: 12px;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #666666;
      font-size: 13px;
    }

    footer a {
      color: #ffffff;
      text-decoration: none;
    }

    /* ── Syntax highlighting tokens (VS Code Dark+ inspired) ── */
    .tok-keyword    { color: #569cd6; }
    .tok-type       { color: #4ec9b0; }
    .tok-number     { color: #b5cea8; }
    .tok-string     { color: #ce9178; }
    .tok-comment    { color: #6a9955; font-style: italic; }
    .tok-annotation { color: #dcdcaa; }
    .tok-method     { color: #dcdcaa; }
    .tok-variable   { color: #9cdcfe; }
    .tok-operator   { color: #d4d4d4; }
    .tok-punctuation{ color: #d4d4d4; }
    .tok-boolean    { color: #569cd6; }
    .tok-class-name { color: #4ec9b0; }
    .tok-builtin    { color: #dcdcaa; }
    .tok-self       { color: #569cd6; font-style: italic; }
  </style>
</head>
<body>

  <div class="container">
    <p class="subtitle">Count: <span class="badge-count" id="badge-count">0</span></p>
    <ul class="solution-list" id="solution-list"></ul>
  </div>

  <script>

    const solutions = [
      { number: 1,   title: "Two Sum",                                  lang: "Java" },
      { number: 9,   title: "Palindrome Number",                        lang: "Java" },
      { number: 13,  title: "Roman to Integer",                         lang: "Java" },
      { number: 26,  title: "Remove Duplicates from Sorted Array",      lang: "Python" },
      { number: 35,  title: "Search Insert Position",                   lang: "Java" },
      { number: 66,  title: "Plus One",                                 lang: "Java" },
      { number: 100, title: "Same Tree",                                lang: "Java" },
      { number: 104, title: "Maximum Depth of Binary Tree",             lang: "Java" },
      { number: 118, title: "Pascal's Triangle",                        lang: "Java" },
      { number: 121, title: "Best Time to Buy and Sell Stock",          lang: "Java" },
      { number: 145, title: "Binary Tree Postorder Traversal",          lang: "Java" },
      { number: 169, title: "Majority Element",                         lang: "Java" },
      { number: 202, title: "Happy Number",                             lang: "Java" },
      { number: 217, title: "Contains Duplicate",                       lang: "Java" },
      { number: 448, title: "Find All Numbers Disappeared in an Array", lang: "Java" },
      { number: 888, title: "Fair Candy Swap",                          lang: "Java" },
    ];

    document.getElementById('badge-count').textContent = solutions.length;

    function buildFilePath(sol) {
      const ext = sol.lang.toLowerCase() === 'python' ? 'py' : 'java';
      const slug = sol.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      const folder = `${sol.number} ${sol.title}`;
      const filename = `${sol.number}${slug}.${ext}`;
      return `solutions/${folder}/${filename}`;
    }

    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

  // Syntax Highlighting Engine 

    function highlightJava(code) {
      const keywords = new Set([
        'abstract','assert','break','case','catch','class','const','continue',
        'default','do','else','enum','extends','final','finally','for','goto',
        'if','implements','import','instanceof','interface','native','new',
        'package','private','protected','public','return','static','strictfp',
        'super','switch','synchronized','this','throw','throws','transient',
        'try','volatile','while','void'
      ]);
      const types = new Set([
        'boolean','byte','char','double','float','int','long','short',
        'String','Integer','Long','Double','Float','Boolean','Character',
        'List','ArrayList','LinkedList','Map','HashMap','TreeMap','Set',
        'HashSet','TreeSet','Queue','Stack','Arrays','Collections',
        'Object','Comparable','Iterable','Iterator','StringBuilder',
        'Math','System'
      ]);
      const booleans = new Set(['true','false','null']);

      const tokenRules = [
        { regex: /\/\/[^\n]*/,                          cls: 'tok-comment' },
        { regex: /\/\*[\s\S]*?\*\//,                    cls: 'tok-comment' },
        { regex: /@\w+/,                                cls: 'tok-annotation' },
        { regex: /"(?:\\.|[^"\\])*"/,                   cls: 'tok-string' },
        { regex: /'(?:\\.|[^'\\])'/,                    cls: 'tok-string' },
        { regex: /\b\d+\.?\d*[fFdDlL]?\b/,             cls: 'tok-number' },
        { regex: /\b0[xX][0-9a-fA-F]+\b/,              cls: 'tok-number' },
        { regex: /\b[a-zA-Z_]\w*(?=\s*\()/,            cls: null, resolve: w => keywords.has(w) ? 'tok-keyword' : 'tok-method' },
        { regex: /\b[a-zA-Z_]\w*/,                      cls: null, resolve: w => {
            if (keywords.has(w))  return 'tok-keyword';
            if (booleans.has(w))  return 'tok-boolean';
            if (types.has(w))     return 'tok-type';
            if (w[0] === w[0].toUpperCase() && w[0] !== w[0].toLowerCase()) return 'tok-class-name';
            return 'tok-variable';
          }
        },
        { regex: /[+\-*/%=!<>&|^~?:]+/,                cls: 'tok-operator' },
        { regex: /[{}()\[\];,.]/,                       cls: 'tok-punctuation' },
      ];

      return tokenize(code, tokenRules);
    }

    function highlightPython(code) {
      const keywords = new Set([
        'False','None','True','and','as','assert','async','await','break',
        'class','continue','def','del','elif','else','except','finally',
        'for','from','global','if','import','in','is','lambda','nonlocal',
        'not','or','pass','raise','return','try','while','with','yield'
      ]);
      const builtins = new Set([
        'print','len','range','int','str','float','list','dict','set',
        'tuple','bool','type','isinstance','enumerate','zip','map','filter',
        'sorted','reversed','sum','min','max','abs','any','all','open',
        'input','super','property','staticmethod','classmethod','hasattr',
        'getattr','setattr','delattr','repr','hash','id','iter','next',
        'round','pow','divmod','format','chr','ord','hex','oct','bin'
      ]);
      const booleans = new Set(['True','False','None']);

      const tokenRules = [
        { regex: /#[^\n]*/,                              cls: 'tok-comment' },
        { regex: /"""[\s\S]*?"""/,                       cls: 'tok-string' },
        { regex: /'''[\s\S]*?'''/,                       cls: 'tok-string' },
        { regex: /f"(?:\\.|[^"\\])*"/,                   cls: 'tok-string' },
        { regex: /f'(?:\\.|[^'\\])*'/,                   cls: 'tok-string' },
        { regex: /"(?:\\.|[^"\\])*"/,                    cls: 'tok-string' },
        { regex: /'(?:\\.|[^'\\])*'/,                    cls: 'tok-string' },
        { regex: /\b\d+\.?\d*[jJ]?\b/,                  cls: 'tok-number' },
        { regex: /\b0[xXoObB][0-9a-fA-F_]+\b/,          cls: 'tok-number' },
        { regex: /@\w+/,                                 cls: 'tok-annotation' },
        { regex: /\b[a-zA-Z_]\w*(?=\s*\()/,             cls: null, resolve: w => {
            if (keywords.has(w))  return 'tok-keyword';
            if (builtins.has(w))  return 'tok-builtin';
            return 'tok-method';
          }
        },
        { regex: /\bself\b/,                             cls: 'tok-self' },
        { regex: /\b[a-zA-Z_]\w*/,                       cls: null, resolve: w => {
            if (keywords.has(w))  return 'tok-keyword';
            if (booleans.has(w))  return 'tok-boolean';
            if (builtins.has(w))  return 'tok-builtin';
            if (w[0] === w[0].toUpperCase() && w[0] !== w[0].toLowerCase()) return 'tok-class-name';
            return 'tok-variable';
          }
        },
        { regex: /[+\-*/%=!<>&|^~@:]+/,                 cls: 'tok-operator' },
        { regex: /[{}()\[\];,.]/,                        cls: 'tok-punctuation' },
      ];

      return tokenize(code, tokenRules);
    }

    function tokenize(code, rules) {
      // Build one combined regex from all rules
      const combined = new RegExp(
        rules.map((r, i) => `(${r.regex.source})`).join('|'),
        'gm'
      );

      let result = '';
      let lastIndex = 0;

      for (const match of code.matchAll(combined)) {
        // Append any plain text before this match
        if (match.index > lastIndex) {
          result += escapeHTML(code.slice(lastIndex, match.index));
        }

        // Figure out which group matched
        const fullMatch = match[0];
        let cls = null;
        for (let i = 0; i < rules.length; i++) {
          if (match[i + 1] !== undefined) {
            cls = rules[i].cls || (rules[i].resolve ? rules[i].resolve(fullMatch) : null);
            break;
          }
        }

        if (cls) {
          result += `<span class="${cls}">${escapeHTML(fullMatch)}</span>`;
        } else {
          result += escapeHTML(fullMatch);
        }

        lastIndex = match.index + fullMatch.length;
      }

      // Append any remaining plain text
      if (lastIndex < code.length) {
        result += escapeHTML(code.slice(lastIndex));
      }

      return result;
    }

    function highlightCode(code, lang) {
      if (lang.toLowerCase() === 'java') return highlightJava(code);
      if (lang.toLowerCase() === 'python') return highlightPython(code);
      return escapeHTML(code);
    }


    const list = document.getElementById('solution-list');

    solutions.forEach((sol, i) => {
      const li = document.createElement('li');
      li.className = 'solution-item';
      li.innerHTML = `
        <div class="solution-link" data-index="${i}">
          <div style="display:flex;align-items:center;">
            <span class="solution-number">#${sol.number}</span>
            <span class="solution-title">${sol.title}</span>
            <span class="solution-lang">${sol.lang}</span>
          </div>
          <span class="arrow">&#9654;</span>
        </div>
        <div class="code-panel" id="panel-${i}">
          <pre><code>Loading...</code></pre>
        </div>
      `;
      list.appendChild(li);

      li.querySelector('.solution-link').addEventListener('click', () => togglePanel(i));
    });

    async function togglePanel(index) {
      const panel = document.getElementById(`panel-${index}`);
      const arrow = panel.previousElementSibling.querySelector('.arrow');
      const isOpen = panel.classList.contains('open');

      if (isOpen) {
        panel.classList.remove('open');
        arrow.classList.remove('open');
        return;
      }

      panel.classList.add('open');
      arrow.classList.add('open');

      if (panel.dataset.loaded === 'true') return;

      try {
        const filePath = buildFilePath(solutions[index]);
        const res = await fetch(filePath);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const code = await res.text();
        const highlighted = highlightCode(code, solutions[index].lang);
        panel.innerHTML = `<pre><code>${highlighted}</code></pre>`;
        panel.dataset.loaded = 'true';
      } catch (err) {
        panel.innerHTML = `<pre><code class="error">Error loading file: ${err.message}</code></pre>`;
      }
    }
  </script>
</body>
</html>
